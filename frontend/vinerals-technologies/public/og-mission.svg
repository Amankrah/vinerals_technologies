<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Forest paper substrate -->
  <rect width="1200" height="630" fill="#1F3A2E"/>

  <!-- Subtle paper grain — keeps the surface from reading as flat digital -->
  <defs>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.247 0 0 0 0 0.219 0 0 0 0 0.161 0 0 0 0.35 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="#1F3A2E" filter="url(#grain)" opacity="0.5"/>

  <!-- Top dateline strip -->
  <text x="80" y="74" font-family='"DM Mono", "Courier New", Courier, monospace' font-size="14" letter-spacing="3.5" fill="rgba(245, 239, 230, 0.55)">VINERALS · TECHNOLOGIES · ÉDITION 2025</text>
  <line x1="80" y1="100" x2="1120" y2="100" stroke="rgba(245, 239, 230, 0.22)" stroke-width="1"/>

  <!-- Hand-traced V monogram, top-right -->
  <g transform="translate(1040, 30)">
    <path
      d="M12 16 Q 20 14, 32 70 Q 44 14, 52 16"
      stroke="#F5EFE6"
      stroke-width="3"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
    <circle cx="32" cy="70" r="3.2" fill="#B8634A"/>
  </g>

  <!-- Eyebrow -->
  <text x="80" y="195" font-family='"DM Mono", "Courier New", Courier, monospace' font-size="16" letter-spacing="4" fill="#DA8C6E">— LA MISSION</text>

  <!-- Headline, two lines: first cream, second clay-italic accent -->
  <text x="80" y="310" font-family='"Cormorant Garamond", "Cormorant", Georgia, "Times New Roman", serif' font-style="italic" font-size="82" font-weight="500" fill="#F5EFE6">Closing the digital</text>
  <text x="80" y="400" font-family='"Cormorant Garamond", "Cormorant", Georgia, "Times New Roman", serif' font-style="italic" font-size="82" font-weight="500" fill="#DA8C6E">divide for SMEs.</text>

  <!-- Supporting line(s) -->
  <text x="80" y="490" font-family='"Cormorant Garamond", "Cormorant", Georgia, "Times New Roman", serif' font-size="26" font-weight="400" fill="rgba(245, 239, 230, 0.75)">
      <tspan x="80" dy="0">Enterprise-calibre software, brought inside reach through</tspan>
      <tspan x="80" dy="38">government programmes and impact funding.</tspan>
  </text>

  <!-- Bottom hairline + imprint -->
  <line x1="80" y1="550" x2="1120" y2="550" stroke="rgba(245, 239, 230, 0.22)" stroke-width="1"/>
  <text x="80" y="582" font-family='"DM Mono", "Courier New", Courier, monospace' font-size="13" letter-spacing="3" fill="rgba(245, 239, 230, 0.55)">COOPÉRATIVE DE SOLIDARITÉ · TIO'TIA:KE / MONTRÉAL · BILINGUE EN / FR</text>
  <text x="1120" y="582" text-anchor="end" font-family='"DM Mono", "Courier New", Courier, monospace' font-size="13" letter-spacing="3" fill="rgba(245, 239, 230, 0.55)">VINERALSTECHNOLOGIES.COM</text>
</svg>
